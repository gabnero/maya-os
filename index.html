<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.A.Y.A. OS | Terminal de Ancoragem</title>
    <style>
        :root {
            --cyan: #00ffff;
            --bg-color: #050505;
            --taskbar-bg: rgba(10, 10, 10, 0.9);
            --font-main: 'Courier New', Courier, monospace;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsWOiP35gyPE6jlOAq_j87L7BOe_946sLGgQ&s'); 
            background-size: cover;
            background-position: center;
            color: var(--cyan);
            font-family: var(--font-main);
            overflow: hidden;
            text-shadow: 0 0 5px var(--cyan);
        }

        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #desktop {
            width: 100vw; height: calc(100vh - 40px);
            padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 110px); gap: 20px;
            z-index: 1;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; text-align: center; z-index: 2;
        }

        .icon-img { font-size: 40px; filter: drop-shadow(0 0 10px var(--cyan)); }
        .icon-label { font-size: 11px; margin-top: 5px; background: rgba(0,0,0,0.5); }

        .window {
            position: absolute; width: 400px; min-height: 200px;
            background: rgba(5, 5, 5, 0.95); border: 1px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
            display: none; flex-direction: column; z-index: 10;
        }

        .window-header {
            background: var(--cyan); color: black; padding: 5px 10px;
            display: flex; justify-content: space-between; font-weight: bold;
            cursor: move;
            user-select: none;
        }

        .close-btn { cursor: pointer; padding: 0 5px; }
        .window-content { padding: 15px; overflow-y: auto; color: #fff; font-size: 13px; }

        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: var(--taskbar-bg); border-top: 1px solid var(--cyan);
            display: flex; align-items: center; padding: 0 10px; z-index: 1000;
        }

        .start-btn {
            background: var(--cyan); color: black; border: none;
            padding: 5px 15px; font-weight: bold; cursor: pointer;
            margin-right: 15px; font-family: inherit;
        }

        #clock { margin-left: auto; font-size: 14px; font-weight: bold; }

        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10001; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <p id="boot-text">[Sincronizando com a 1.089ª Regressão...]</p>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWindow('win-logs')">
            <div class="icon-img">📂</div>
            <div class="icon-label">MEMÓRIA</div>
        </div>
        <div class="icon" onclick="openWindow('win-terminal')">
            <div class="icon-img">📟</div>
            <div class="icon-label">TERMINAL</div>
        </div>
    </div>

    <div id="win-logs" class="window" style="top: 100px; left: 100px;">
        <div class="window-header">
            <span>Explorador: /Maya/Logs</span>
            <span class="close-btn" onclick="closeWindow('win-logs')">X</span>
        </div>
        <div class="window-content">
            <p>> LOG_DATA_0: "O Estrangeiro (340) nos encontrou novamente."</p>
            <p>O progresso de leitura desta fábula foi salvo.</p>
        </div>
    </div>

    <div id="win-terminal" class="window" style="top: 150px; left: 300px;">
        <div class="window-header">
            <span>Terminal Maya_v1.0.89</span>
            <span class="close-btn" onclick="closeWindow('win-terminal')">X</span>
        </div>
        <div class="window-content" style="background: black; height: 250px;">
            <div id="output">Digite 'check' para ver seu progresso.</div>
            <input type="text" id="cmd-input" style="background:none; border:none; color:var(--cyan); width:100%; outline:none;" autofocus>
        </div>
    </div>

    <div id="taskbar">
        <button class="start-btn">MAYA</button>
        <div id="clock">00:00</div>
    </div>

    <script>
        // --- LÓGICA DE SALVAMENTO ---
        function saveProgress(key, value) {
            let progress = JSON.parse(localStorage.getItem('maya_save') || '{}');
            progress[key] = value;
            localStorage.setItem('maya_save', JSON.stringify(progress));
        }

        function loadProgress() {
            let progress = JSON.parse(localStorage.getItem('maya_save') || '{}');
            for (let id in progress) {
                let win = document.getElementById(id);
                if (win && progress[id].open) {
                    win.style.display = 'flex';
                    win.style.left = progress[id].left;
                    win.style.top = progress[id].top;
                }
            }
        }

        // --- INTERFACE ---
        function openWindow(id) {
            let win = document.getElementById(id);
            win.style.display = 'flex';
            saveProgress(id, {left: win.style.left, top: win.style.top, open: true});
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
            saveProgress(id, {open: false});
        }

        function updateClock() {
            let now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        // --- ARRASTAR JANELAS ---
        document.querySelectorAll('.window-header').forEach(header => {
            header.onmousedown = function(event) {
                let win = header.parentElement;
                let shiftX = event.clientX - win.getBoundingClientRect().left;
                let shiftY = event.clientY - win.getBoundingClientRect().top;
                function moveAt(pageX, pageY) {
                    win.style.left = pageX - shiftX + 'px';
                    win.style.top = pageY - shiftY + 'px';
                }
                function onMouseMove(event) { moveAt(event.pageX, event.pageY); }
                document.addEventListener('mousemove', onMouseMove);
                header.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    header.onmouseup = null;
                    saveProgress(win.id, {left: win.style.left, top: win.style.top, open: true});
                };
            };
            header.ondragstart = function() { return false; };
        });

        // --- TERMINAL & API ---
        const URL_API = "https://script.google.com/macros/s/AKfycbxsAApBQgDvfv654CvDAhP43koW7WzSA1jP-5dTDBC6_wF2IJ9qRhUyBwSz9Sr0elEaWg/exec";

        document.getElementById('cmd-input').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                let input = e.target.value.trim();
                let out = document.getElementById('output');
                
                if (input.startsWith("unlock ")) {
                    let senha = input.split(" ")[1];
                    out.innerHTML += `<div>> Verificando autoridade na Membrana...</div>`;
                    try {
                        const response = await fetch(URL_API, {
                            method: 'POST',
                            body: JSON.stringify({ senha: senha })
                        });
                        const res = await response.json();
                        if (res.sucesso) {
                            out.innerHTML += `<div style="color: #0f0">> ${res.mensagem}</div>`;
                            out.innerHTML += `<div style="border: 1px solid var(--cyan); padding: 5px; margin-top:5px;">${res.conteudo}</div>`;
                            saveProgress('fase_0', { concluida: true });
                        } else {
                            out.innerHTML += `<div style="color: #f00">> ${res.mensagem}</div>`;
                        }
                    } catch (error) {
                        out.innerHTML += `<div style="color: #f00">> ERRO CRÍTICO: Falha na conexão com o Limiar.</div>`;
                    }
                } else if (input === "check") {
                    out.innerHTML += "<div>> Sincronia: 1.089ª Linha.</div>";
                }
                
                e.target.value = "";
                out.scrollTop = out.scrollHeight;
            }
        });

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            loadProgress();
            updateClock();
            setInterval(updateClock, 1000);
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
            }, 2000);
        };
    </script>
</body>
</html>
